###############################################
# Common Configuration
###############################################

x-common-env: &common-env
  PUID: 1000
  PGID: 1000
  TZ: Asia/Manila

x-common-keys: &common-keys
  restart: unless-stopped
  logging:
    driver: json-file
  environment: *common-env
  dns:
    - 1.1.1.1
    - 1.0.0.1

###############################################
# Directory Layout
#
# /data
# ├── media
# │   ├── movies
# │   ├── tv
# │   ├── music
# │   ├── anime
# │   ├── books
# │   └── audiobooks
# │
# └── torrents
#     ├── movies
#     ├── tv
#     ├── music
#     ├── anime
#     ├── books
#     ├── audiobooks
#     └── incomplete
###############################################

services:

###############################################
# RADARR
###############################################

  radarr:
    <<: *common-keys
    container_name: radarr
    image: ghcr.io/hotio/radarr:latest
    ports:
      - "7878:7878"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/arrstack/appdata/radarr:/config
      - /mnt/data1:/data

###############################################
# SONARR
###############################################

  sonarr:
    <<: *common-keys
    container_name: sonarr
    image: ghcr.io/hotio/sonarr:latest
    ports:
      - "8989:8989"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/arrstack/appdata/sonarr:/config
      - /mnt/data1:/data

###############################################
# LIDARR
###############################################

  lidarr:
    <<: *common-keys
    container_name: lidarr
    image: ghcr.io/hotio/lidarr:latest
    ports:
      - "8686:8686"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/arrstack/appdata/lidarr:/config
      - /mnt/data1:/data

###############################################
# BAZARR
###############################################

  bazarr:
    <<: *common-keys
    container_name: bazarr
    image: ghcr.io/hotio/bazarr:latest
    ports:
      - "6767:6767"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/arrstack/appdata/bazarr:/config
      - /mnt/data1:/data

###############################################
# PROWLARR
###############################################

  prowlarr:
    <<: *common-keys
    container_name: prowlarr
    image: ghcr.io/hotio/prowlarr:latest
    ports:
      - "9696:9696"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/arrstack/appdata/prowlarr:/config

###############################################
# QBITTORRENT
###############################################

  qbittorrent:
    <<: *common-keys
    container_name: qbittorrent
    image: ghcr.io/hotio/qbittorrent:latest
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    environment:
      <<: *common-env
      WEBUI_PORT: 8080
      TORRENTING_PORT: 6881
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/arrstack/appdata/qbittorrent:/config
      - /mnt/data1:/data

###############################################
# JELLYFIN
###############################################

  jellyfin:
    <<: *common-keys
    container_name: jellyfin
    image: ghcr.io/hotio/jellyfin:latest
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "44"   # video
      - "992"  # render
    ports:
      - "8096:8096"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/arrstack/appdata/jellyfin:/config
      - /mnt/data1:/data:ro

###############################################
# FLARESOLVERR
###############################################

  flaresolverr:
    restart: unless-stopped
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    ports:
      - "8191:8191"
    environment:
      LOG_LEVEL: info
    dns:
      - 1.1.1.1
      - 1.0.0.1

###############################################
# Network
###############################################

networks:
  default:
    name: arr_network
